<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #ffffff;
        color: #ffffff;
        margin: 0;
        padding: 24px;
      }

      .panel {
        background: #f5f5f5;
        border: 1px solid #ddd;
        padding: 16px;
        max-width: 720px;
      }

      .cta {
        background: #f0f0f0;
        color: #f0f0f0;
        border: 0;
        padding: 10px 14px;
        margin-top: 12px;
      }

      .tiny-note {
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <h3>Welcome to the accessibility test page</h3>
      <h1>Sample product card</h1>

      <img src="qrcode.webp" />

      <p class="tiny-note">
        This page is intentionally problematic so the Generate Fix flow has something to repair.
      </p>

      <div>
        <input id="email" type="email" placeholder="Email address" />
        <input id="email" type="text" placeholder="Confirm email" />
      </div>

      <button class="cta"></button>
      <a href="#"></a>

      <section aria-label="related content">
        <h4>Next steps</h4>
        <p>Use this file to run the WCAG scan and generate a fix.</p>
      </section>
    </main>
  </body>
</html>
